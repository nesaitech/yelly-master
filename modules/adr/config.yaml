detail_level: high
format: nygard
numbering: sequential-padded-4
latest_in_8hour_md: 5
require_alternatives: true
permissions:
  tools:
    - Read
    - Grep
    - Glob
    - Bash
    - Edit
    - Write
  bash_commands:
    - "git log *"
    - "git diff *"
    - "ls docs/8hour/adr/*"
  file_access:
    read: "**/*"
    write: "docs/8hour/adr/**/*"
    write_extra:
      - "8HOUR.md"
  dangerous: []
