name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static:
    name: Static Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:static

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  lint-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check all SKILL.md.tmpl have frontmatter
        run: |
          for tmpl in skills/*/SKILL.md.tmpl; do
            if ! head -1 "$tmpl" | grep -q "^---"; then
              echo "ERROR: $tmpl missing frontmatter"
              exit 1
            fi
          done
          echo "All templates have frontmatter"
      - name: Check generated SKILL.md files are up-to-date
        run: |
          node --loader ts-node/esm -e "
          import { generateSkillDocs } from './scripts/gen-skill-docs.js';
          import { readFileSync } from 'fs';
          const version = readFileSync('VERSION', 'utf-8').trim();
          const results = generateSkillDocs({
            skillsDir: 'skills',
            host: 'claude',
            modulesRoot: '~/.claude/skills/yelly-master/modules',
            binRoot: '~/.claude/skills/yelly-master/bin',
            version,
            dryRun: true,
          });
          const failed = results.filter(r => !r.success);
          if (failed.length > 0) {
            console.error('Failed:', failed);
            process.exit(1);
          }
          console.log('All', results.length, 'skills generate successfully');
          "

  validate-modules:
    name: Validate Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all modules have required files
        run: |
          STATUS=0
          for mod in modules/*/; do
            mod_name=$(basename "$mod")
            for file in guide.md patterns.md config.yaml; do
              if [ ! -f "$mod/$file" ]; then
                echo "ERROR: $mod_name missing $file"
                STATUS=1
              fi
            done
            if [ ! -d "$mod/prompts" ]; then
              echo "ERROR: $mod_name missing prompts/"
              STATUS=1
            fi
            if [ ! -d "$mod/hooks" ]; then
              echo "ERROR: $mod_name missing hooks/"
              STATUS=1
            fi
          done
          if [ $STATUS -eq 0 ]; then
            echo "All modules validated"
          fi
          exit $STATUS
